name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: rootpassword
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --username root --password rootpassword --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\""
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: mongodb://root:rootpassword@localhost:27017/app_db?authSource=admin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t lab6-devops-app:latest .
