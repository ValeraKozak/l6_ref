services:
  db:
    image: mongo:7
    container_name: lab6-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username root --password rootpassword --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\""]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lab6-app
    working_dir: /app
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: mongodb://root:rootpassword@db:27017/app_db?authSource=admin
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: lab6-tests
    working_dir: /app
    environment:
      DATABASE_URL: mongodb://root:rootpassword@db:27017/app_db?authSource=admin
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "test"]

volumes:
  mongo_data:
